<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1000" height="700" fill="#ffffff"/>
  <text x="500" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">SHOPEZ — Solution Architecture (Layered View)</text>

  <!-- Presentation Layer -->
  <rect x="60" y="70" width="880" height="150" rx="10" fill="#e8f0fe" stroke="#3b5bdb" stroke-width="2"/>
  <text x="90" y="98" font-size="16" font-weight="bold" fill="#1c3faa">Presentation Layer (Frontend)</text>
  <text x="90" y="120" font-size="12">Tech: React.js, React Router, Redux/Context API, Tailwind CSS</text>
  <rect x="90" y="135" width="150" height="60" rx="6" fill="#ffffff" stroke="#3b5bdb"/>
  <text x="165" y="170" text-anchor="middle" font-size="12">Storefront UI</text>
  <rect x="270" y="135" width="150" height="60" rx="6" fill="#ffffff" stroke="#3b5bdb"/>
  <text x="345" y="170" text-anchor="middle" font-size="12">Cart &amp; Checkout UI</text>
  <rect x="450" y="135" width="150" height="60" rx="6" fill="#ffffff" stroke="#3b5bdb"/>
  <text x="525" y="170" text-anchor="middle" font-size="12">Order Tracking UI</text>
  <rect x="630" y="135" width="150" height="60" rx="6" fill="#ffffff" stroke="#3b5bdb"/>
  <text x="705" y="170" text-anchor="middle" font-size="12">Admin Dashboard</text>
  <rect x="810" y="135" width="110" height="60" rx="6" fill="#ffffff" stroke="#3b5bdb"/>
  <text x="865" y="163" text-anchor="middle" font-size="11">Auth Screens</text>
  <text x="865" y="178" text-anchor="middle" font-size="11">(Login/Signup)</text>

  <!-- arrow -->
  <line x1="500" y1="220" x2="500" y2="260" stroke="#495057" stroke-width="2" marker-end="url(#arr)"/>
  <text x="510" y="245" font-size="11">REST API (HTTPS/JSON)</text>

  <!-- API / Backend Layer -->
  <rect x="60" y="260" width="880" height="180" rx="10" fill="#fff3bf" stroke="#e8a800" stroke-width="2"/>
  <text x="90" y="288" font-size="16" font-weight="bold" fill="#8a6d00">API / Backend Layer</text>
  <text x="90" y="310" font-size="12">Tech: Node.js, Express.js, JWT, bcrypt, Multer (media), Stripe/Razorpay SDK</text>

  <rect x="90" y="325" width="150" height="55" rx="6" fill="#ffffff" stroke="#e8a800"/>
  <text x="165" y="357" text-anchor="middle" font-size="12">Auth Service</text>
  <rect x="270" y="325" width="150" height="55" rx="6" fill="#ffffff" stroke="#e8a800"/>
  <text x="345" y="357" text-anchor="middle" font-size="12">Product Service</text>
  <rect x="450" y="325" width="150" height="55" rx="6" fill="#ffffff" stroke="#e8a800"/>
  <text x="525" y="357" text-anchor="middle" font-size="12">Cart Service</text>
  <rect x="630" y="325" width="150" height="55" rx="6" fill="#ffffff" stroke="#e8a800"/>
  <text x="705" y="350" text-anchor="middle" font-size="12">Order Service</text>
  <text x="705" y="365" text-anchor="middle" font-size="12">+ Payment</text>
  <rect x="810" y="325" width="110" height="55" rx="6" fill="#ffffff" stroke="#e8a800"/>
  <text x="865" y="357" text-anchor="middle" font-size="12">Admin Service</text>

  <text x="90" y="410" font-size="11" fill="#5c4a00">Cross-cutting: input validation, error-handling middleware, rate limiting, CORS, logging</text>

  <!-- arrow -->
  <line x1="500" y1="440" x2="500" y2="480" stroke="#495057" stroke-width="2" marker-end="url(#arr)"/>
  <text x="510" y="465" font-size="11">Mongoose ODM</text>

  <!-- Data Layer -->
  <rect x="60" y="480" width="880" height="120" rx="10" fill="#e6fcf5" stroke="#0ca678" stroke-width="2"/>
  <text x="90" y="508" font-size="16" font-weight="bold" fill="#046a52">Data Layer</text>
  <text x="90" y="530" font-size="12">Tech: MongoDB Atlas (cloud, document store)</text>
  <rect x="90" y="545" width="140" height="45" rx="6" fill="#ffffff" stroke="#0ca678"/>
  <text x="160" y="572" text-anchor="middle" font-size="12">Users</text>
  <rect x="250" y="545" width="140" height="45" rx="6" fill="#ffffff" stroke="#0ca678"/>
  <text x="320" y="572" text-anchor="middle" font-size="12">Products</text>
  <rect x="410" y="545" width="140" height="45" rx="6" fill="#ffffff" stroke="#0ca678"/>
  <text x="480" y="572" text-anchor="middle" font-size="12">Carts</text>
  <rect x="570" y="545" width="140" height="45" rx="6" fill="#ffffff" stroke="#0ca678"/>
  <text x="640" y="572" text-anchor="middle" font-size="12">Orders</text>
  <rect x="730" y="545" width="180" height="45" rx="6" fill="#ffffff" stroke="#0ca678"/>
  <text x="820" y="572" text-anchor="middle" font-size="12">Reviews / Wishlist</text>

  <!-- External: Payment Gateway -->
  <ellipse cx="920" cy="355" rx="0" ry="0" fill="none"/>
  <rect x="60" y="620" width="400" height="55" rx="8" fill="#f8f0fc" stroke="#9c36b5" stroke-width="2"/>
  <text x="80" y="640" font-size="12" font-weight="bold">External: Payment Gateway</text>
  <text x="80" y="658" font-size="11">Razorpay / Stripe (sandbox) — tokenized transactions</text>

  <rect x="540" y="620" width="400" height="55" rx="8" fill="#f8f0fc" stroke="#9c36b5" stroke-width="2"/>
  <text x="560" y="640" font-size="12" font-weight="bold">Deployment</text>
  <text x="560" y="658" font-size="11">Frontend: Vercel · Backend: Render/AWS · DB: MongoDB Atlas</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>
</svg>
